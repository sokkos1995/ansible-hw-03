---
vector_url: "https://packages.timber.io/vector/0.21.2/vector_0.21.2-1_amd64.deb"
vector_config:
  sources:
    our_log:
      type: file
      ignore_older_secs: 600
      include:
        - /home/ubuntu/logs/*.log
      read_from: beginning
  sinks:
    to_clickhouse:
      type: clickhouse
      inputs:
        - our_log
      database: logs
      endpoint: "http://{{ hostvars['clickhouse-01'].ansible_host }}:8123"
      table: my_table
      compression: gzip
      healthcheck: false
      skip_unknown_fields: true
