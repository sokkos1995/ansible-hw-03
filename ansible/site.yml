---
# ============================================
# PLAY 1: ClickHouse
# ============================================
- name: Install ClickHouse
  hosts: clickhouse
  become: true
  roles:
    - clickhouse

# ============================================
# PLAY 2: Vector
# ============================================
- name: Install Vector
  hosts: vector
  roles:
    - vector

# ============================================
# PLAY 3: Lighthouse (nginx is a dependency of the role)
# ============================================
- name: Install Lighthouse
  hosts: lighthouse
  become: true
  roles:
    - lighthouse
