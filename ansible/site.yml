---
# ============================================
# PLAY 1: Install nginx
# ============================================
- name: Install nginx
  hosts: lighthouse
  handlers:
    - name: start-nginx
      become: true
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
    - name: restart-nginx
      become: true
      ansible.builtin.service:
        name: nginx
        state: restarted

  tasks:
    - name: NGINX | Install NGINX
      become: true
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true
      notify: start-nginx

    - name: NGINX | Disable default site
      become: true
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart-nginx

    - name: NGINX | Create general config
      become: true
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        mode: "0644"
      notify: restart-nginx

# ============================================
# PLAY 2: Install lighthouse
# ============================================
- name: Install lighthouse
  hosts: lighthouse
  handlers:
    - name: restart-nginx
      become: true
      ansible.builtin.service:
        name: nginx
        state: restarted

  pre_tasks:
    - name: Lighthouse | Install dependencies
      become: true
      ansible.builtin.apt:
        name: git
        state: present
        update_cache: true

  tasks:
    - name: Lighthouse | Copy from git
      become: true
      ansible.builtin.git:
        repo: "{{ lighthouse_vcs }}"
        version: master
        dest: "{{ lighthouse_location_dir }}"

    - name: Lighthouse | Create lighthouse config
      become: true
      ansible.builtin.template:
        src: lighthouse.conf.j2
        dest: /etc/nginx/conf.d/default.conf
        mode: "0644"
      notify: restart-nginx

# ============================================
# PLAY 3: Install Clickhouse
# ============================================
- name: Install Clickhouse
  hosts: clickhouse
  handlers:
    - name: Start clickhouse service
      become: true
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted

  tasks:
    - block:
        - name: Get clickhouse packages
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/deb/pool/main/c/{{ item.name }}/{{ item.name }}_{{ clickhouse_version }}_{{ item.arch }}.deb"
            dest: "./{{ item.name }}_{{ clickhouse_version }}_{{ item.arch }}.deb"
            mode: "0644"
          loop: "{{ clickhouse_packages }}"
          check_mode: false

      rescue:
        - name: Get clickhouse-common-static package
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/deb/pool/main/c/clickhouse-common-static/clickhouse-common-static_{{ clickhouse_version }}_amd64.deb"
            dest: "./clickhouse-common-static_{{ clickhouse_version }}_amd64.deb"
            mode: "0644"
          check_mode: false

    - name: Install clickhouse packages
      become: true
      ansible.builtin.apt:
        deb: "./{{ item.name }}_{{ clickhouse_version }}_{{ item.arch }}.deb"
      loop: "{{ clickhouse_packages }}"
      notify: Start clickhouse service

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: create_db.rc == 0

# ============================================
# PLAY 4: Install Vector
# ============================================
- name: Install Vector
  hosts: vector
  tasks:
    - name: Vector | Download deb
      ansible.builtin.get_url:
        url: "{{ vector_url }}"
        dest: "./vector.deb"
        mode: "0644"

    - name: Vector | Install deb
      become: true
      ansible.builtin.apt:
        deb: ./vector.deb

    - name: Vector | Template config
      ansible.builtin.template:
        src: vector.yml.j2
        dest: vector.yml
        mode: "0644"
        owner: "{{ ansible_user_id }}"
